# WireGuard CLIENT — import this on the RESTAURANT PC (the one with the printer).
# Windows: open the WireGuard app → "Add Tunnel" → import this .conf → Activate.
# Linux:   /etc/wireguard/wg0.conf  →  wg-quick up wg0
#
# Fill the <...> placeholders. One file PER restaurant (unique Address: .2, .3, .4 …).

[Interface]
Address = 10.8.0.2/24
PrivateKey = <PANDOK_CLIENT_PRIVATE_KEY>

[Peer]
PublicKey = <SERVER_PUBLIC_KEY>
Endpoint = <CLOUD_PUBLIC_IP>:51820
AllowedIPs = 10.8.0.0/24
# REQUIRED: keeps the NAT mapping open so the cloud can reach this PC to print.
PersistentKeepalive = 25
