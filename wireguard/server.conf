# WireGuard SERVER — runs on the CLOUD host (same machine as the Node backend).
# Place at /etc/wireguard/wg0.conf  →  enable with: wg-quick up wg0
#
# Fill the <...> placeholders (see README.md for key generation).

[Interface]
Address = 10.8.0.1/24
ListenPort = 51820
PrivateKey = <SERVER_PRIVATE_KEY>

# ── Restaurant: Pandok ───────────────────────────────────────────
[Peer]
PublicKey = <PANDOK_CLIENT_PUBLIC_KEY>
AllowedIPs = 10.8.0.2/32

# ── Add more restaurants: copy the block, bump the IP (10.8.0.3, .4, …) ──
# [Peer]
# PublicKey = <RESTAURANT2_CLIENT_PUBLIC_KEY>
# AllowedIPs = 10.8.0.3/32
